<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilda Frozen Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9ff3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .profile {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.4);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .profile h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .profile p {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 400;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .links {
            width: 100%;
        }

        .link {
            display: block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 20px 25px;
            margin-bottom: 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .link:hover::before {
            left: 100%;
        }

        .link:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .link i {
            margin-right: 15px;
            font-size: 22px;
            width: 25px;
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 22px;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .social-links a:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-5px) scale(1.1);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            opacity: 0.8;
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .profile h1 { font-size: 24px; }
            .profile-img { width: 110px; height: 110px; }
        }

        /* Animasi */
        .link {
            animation: slideInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .link:nth-child(1) { animation-delay: 0.1s; }
        .link:nth-child(2) { animation-delay: 0.2s; }
        .link:nth-child(3) { animation-delay: 0.3s; }
        .link:nth-child(4) { animation-delay: 0.4s; }
        .link:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <!-- ✅ FOTO SUDAH SIAP - Ganti src jika punya foto sendiri -->
            <img src="maka.jpg" 
                 alt="Hilda Frozen Food" 
                 class="profile-img">
            <h1>Hilda Frozen Food</h1>
            <p>🍗🍖 Frozen Food Premium • Siap Masak</p>
        </div>

        <div class="links">
            <a href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20pesan" class="link" target="_blank">
                <i class="fab fa-whatsapp"></i>📱 WhatsApp Order
            </a>
            <a href="https://www.instagram.com/hildafrozenfood" class="link" target="_blank">
                <i class="fab fa-instagram"></i>📸 Instagram
            </a>
            <a href="https://shopee.co.id/hildafrozenfood" class="link" target="_blank">
                <i class="fab fa-shopify"></i>🛒 Shopee
            </a>
            <a href="https://tokopedia.com/hildafrozenfood" class="link" target="_blank">
                <i class="fas fa-shopping-bag"></i>🏪 Tokopedia
            </a>
            <a href="https://goo.gl/maps/abc123" class="link" target="_blank">
                <i class="fas fa-map-marker-alt"></i>📍 Lokasi Toko
            </a>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/hildafrozenfood" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://tiktok.com/@hildafrozenfood" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://facebook.com/hildafrozenfood" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
        </div>

        <div class="footer">
            <p>👩‍🍳 PIXEL MARKET</p>
        </div>
    </div>
</body>
</html>
