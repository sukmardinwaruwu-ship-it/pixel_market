<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #dc2626 0%, #b91c1c 50%, #991b1b 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --accent: #fef3c7;
            --shadow: 0 25px 50px rgba(220, 38, 38, 0.3);
            --shadow-hover: 0 35px 70px rgba(220, 38, 38, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .profile {
            text-align: center;
            margin-bottom: 35px;
        }

        .profile-img {
            width: 300px;
            height: 110px;
            border-radius: 0%;
            border: 4px solid rgba(255,255,255,0.4);
            margin: 0 auto 20px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
        }

        .profile-img:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.7); }

        .profile h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #fef3c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(254, 243, 199, 0.2);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(254, 243, 199, 0.3);
        }

        .section { margin-bottom: 30px; }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            opacity: 0.95;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .link {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
            text-decoration: none;
            padding: 20px 24px;
            margin-bottom: 14px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.25);
            box-shadow: var(--shadow-hover);
        }

        .link-icon {
            width: 28px;
            height: 28px;
            margin-right: 16px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.25);
            border-radius: 12px;
            flex-shrink: 0;
        }

        /* Price List */
        .price-section {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .price-item:last-child { border-bottom: none; padding-bottom: 0; }

        .price-item:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 12px;
            border-radius: 12px;
            margin: 0 -12px;
            padding: 14px 12px;
        }

        .price-name {
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-value {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            min-width: 80px;
            text-align: right;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 25px 0;
        }

        .social-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 48px;
        }

        .social-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-4px) scale(1.08);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Animations */
        .link, .price-item {
            opacity: 0;
            transform: translateY(25px);
            animation: slideInUp 0.6s ease forwards;
        }

        .quick-link:nth-child(1) { animation-delay: 0.1s; }
        .quick-link:nth-child(2) { animation-delay: 0.2s; }
        .quick-link:nth-child(3) { animation-delay: 0.3s; }
        .market-link:nth-child(1) { animation-delay: 0.4s; }
        .market-link:nth-child(2) { animation-delay: 0.45s; }
        .market-link:nth-child(3) { animation-delay: 0.5s; }
        .market-link:nth-child(4) { animation-delay: 0.55s; }
        .market-link:nth-child(5) { animation-delay: 0.6s; }
        .price-item:nth-child(1) { animation-delay: 0.7s; }
        .price-item:nth-child(2) { animation-delay: 0.75s; }
        .price-item:nth-child(3) { animation-delay: 0.8s; }
        .price-item:nth-child(4) { animation-delay: 0.85s; }

        @keyframes slideInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container { margin: 10px; padding: 30px 25px; }
            .social-links { gap: 10px; }
            .social-btn { width: 44px; height: 44px; font-size: 16px; }
        }
    </style>
</head>
